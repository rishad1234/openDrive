services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./server/.env
    environment:
      - STATIC_DIR=/app/static
      - DB_PATH=/app/data/opendrive.db
      - PORT=3000
    volumes:
      - ./server/data:/app/data
